version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cnapi-dev
    ports:
      - "8080:8080"
      - "2345:2345"
    environment:
      - ENV=development
      - DB_DRIVER=sqlite3
      - DB_DSN=./data/db.sqlite
      - DB_MAX_OPEN_CONNS=25
      - DB_MAX_IDLE_CONNS=5
      - DB_CONN_MAX_LIFETIME=5m
      - FETCHER_HTTP_TIMEOUT=15s
      - FETCHER_BROWSER_API_URL=http://browser-api:8000
      - FETCHER_BROWSER_TIMEOUT=60s
      - FETCHER_BROWSER_WAIT_TIME=15
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
      - LOG_ADD_SOURCE=true
      - SCHEDULER_ENABLED=true
      - SCHEDULER_SCRAPE_INTERVAL=1h
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - HTTP_READ_TIMEOUT=30s
      - HTTP_WRITE_TIMEOUT=30s
      - HTTP_IDLE_TIMEOUT=120s
      - HTTP_SHUTDOWN_TIMEOUT=15s
    volumes:
      # Mount source code for hot reload
      - ./:/app
      # build cache
      - go-cache:/root/.cache/go-build
      # module cache
      - go-mod:/go/pkg/mod
    networks:
      - ceylonnews
    restart: unless-stopped
    depends_on:
      browser-api:
        condition: service_healthy

  browser-api:
    build:
      context: ./browser-api
      dockerfile: Dockerfile
    container_name: browser-api-dev
    ports:
      - "8000:8000"
    volumes:
      - ./browser-api:/app
    networks:
      - ceylonnews
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  ceylonnews:
    driver: bridge

volumes:
  go-cache:
  go-mod:
