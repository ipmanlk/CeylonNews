<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'unsafe-inline' data: blob:; img-src * 'unsafe-inline' data: blob:; font-src * 'unsafe-inline' data: blob:; connect-src * 'unsafe-inline' data: blob:; media-src * 'unsafe-inline' data: blob:; object-src * 'unsafe-inline' data: blob:; frame-src * 'unsafe-inline' data: blob:; worker-src * 'unsafe-inline' data: blob:; manifest-src * 'unsafe-inline' data: blob:;"
    />
    <title>Saved Articles</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("app_theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();
    </script>
  </head>
  <body>
    <header class="glass-header">
      <div class="container">
        <h1>Saved Articles</h1>
      </div>
    </header>

    <div class="container" style="padding-top: 24px">
      <div id="empty-state" class="flex-center" style="flex-direction: column; padding: 60px 20px; display: none;">
        <i class="ph ph-bookmark-simple" style="font-size: 64px; color: var(--text-muted); margin-bottom: 16px;"></i>
        <p style="color: var(--text-muted); text-align: center;">No saved articles yet</p>
        <p class="text-sm text-muted mt-2">Tap the bookmark icon on any article to save it</p>
        <button onclick="window.location.href='home.html'" class="btn btn-outline" style="margin-top: 24px; width: auto;">Browse Articles</button>
      </div>

      <div id="articles-container" style="padding-bottom: 20px;"></div>
    </div>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item">
        <i class="ph ph-house"></i>
        <span>Home</span>
      </a>
      <a href="search.html" class="nav-item">
        <i class="ph ph-magnifying-glass"></i>
        <span>Search</span>
      </a>
      <a href="saved-articles.html" class="nav-item active">
        <i class="ph-fill ph-bookmark-simple"></i>
        <span>Saved</span>
      </a>
      <a href="settings.html" class="nav-item">
        <i class="ph ph-gear"></i>
        <span>Settings</span>
      </a>
    </nav>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
      function getFontClass() {
        const lang = localStorage.getItem("ceylon_news_lang") || "en";
        const useCustomFont = localStorage.getItem("use_custom_font") === "true";
        return useCustomFont ? `${lang}-font` : "";
      }

      function createArticleCard(article) {
        const card = document.createElement("div");
        card.className = "card card-compact mb-3";
        const imageHTML = article.image_url
          ? `<img src="${article.image_url}" class="card-image" alt="${article.title}" onerror="this.src='${getFallbackImage()}'; this.onerror=null;" />`
          : `<img src="${getFallbackImage()}" class="card-image" alt="${article.title}" />`;
        const fontClass = getFontClass();
        card.innerHTML = `
          ${imageHTML}
          <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
            <div style="flex: 1; min-width: 0;">
              <h3 class="card-title ${fontClass}">${article.title}</h3>
              <span class="text-xs text-muted mt-1">${article.source_name} • ${formatDate(article.published_at)}</span>
            </div>
            <button class="unsave-btn" data-id="${article.id}" style="background: none; border: none; padding: 8px; cursor: pointer; color: var(--text-muted);">
              <i class="ph-fill ph-bookmark-simple" style="font-size: 20px; color: var(--accent);"></i>
            </button>
          </div>
        `;
        
        card.querySelector(".card-title").addEventListener("click", () => {
          window.location.href = `article.html?id=${article.id}`;
        });
        
        card.querySelector(".card-image").addEventListener("click", () => {
          window.location.href = `article.html?id=${article.id}`;
        });
        
        card.querySelector(".unsave-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          removeArticle(article.id);
          card.style.opacity = "0";
          card.style.transform = "translateX(-20px)";
          setTimeout(() => {
            card.remove();
            loadSavedArticles();
          }, 200);
        });
        
        return card;
      }

      function loadSavedArticles() {
        const saved = getSavedArticles();
        const container = document.getElementById("articles-container");
        const emptyState = document.getElementById("empty-state");
        
        container.innerHTML = "";
        
        if (saved.length === 0) {
          emptyState.style.display = "flex";
          return;
        }
        
        emptyState.style.display = "none";
        
        saved.reverse().forEach((article) => {
          const card = createArticleCard(article);
          container.appendChild(card);
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadSavedArticles();
      });
    </script>
  </body>
</html>
