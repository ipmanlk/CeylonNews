<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'unsafe-inline' data: blob:; img-src * 'unsafe-inline' data: blob:; font-src * 'unsafe-inline' data: blob:; connect-src * 'unsafe-inline' data: blob:; media-src * 'unsafe-inline' data: blob:; object-src * 'unsafe-inline' data: blob:; frame-src * 'unsafe-inline' data: blob:; worker-src * 'unsafe-inline' data: blob:; manifest-src * 'unsafe-inline' data: blob:;"
    />
    <title>Ceylon News - Select Language</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("app_theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();
    </script>
  </head>
  <body
    id="lang-select-page"
    class="flex-center"
    style="min-height: 100vh; padding-bottom: 0"
  >
    <div
      class="container"
      style="width: 100%; max-width: 400px; text-align: center"
    >
      <div class="animate-fade-in-up" style="margin-bottom: 48px">
        <div
          style="
            width: 80px;
            height: 80px;
            background: var(--accent-light);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
          "
        >
          <i
            class="ph-fill ph-newspaper-clipping"
            style="font-size: 40px; color: var(--accent)"
          ></i>
        </div>
        <h1 style="margin-bottom: 8px">Ceylon News</h1>
        <p class="text-muted">Your daily aggregator for Sri Lankan news</p>
      </div>

      <div
        class="animate-fade-in-up stagger-1"
        style="display: flex; flex-direction: column; gap: 12px"
      >
        <p
          class="text-sm text-muted"
          style="margin-bottom: 8px; font-weight: 600; letter-spacing: 0.05em"
        >
          SELECT YOUR LANGUAGE / කරුණාකර ඔබගේ භාෂාව තෝරන්න / உங்கள் மொழியைத் தேர்ந்தெடுக்கவும்
        </p>

        <button
          onclick="setLanguage('en')"
          class="card flex-between"
          style="
            width: 100%;
            cursor: pointer;
            padding: 16px 20px;
            transition: all 0.2s ease;
          "
        >
          <div class="flex-center" style="gap: 14px">
            <div
              style="
                width: 44px;
                height: 44px;
                background: var(--accent-light);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span
                style="font-size: 18px; font-weight: 700; color: var(--accent)"
                >EN</span
              >
            </div>
            <span
              style="font-weight: 600; font-size: 16px; color: var(--text-main)"
              >English</span
            >
          </div>
          <i
            class="ph ph-caret-right"
            style="color: var(--text-muted); font-size: 18px"
          ></i>
        </button>

        <button
          onclick="setLanguage('si')"
          class="card flex-between"
          style="
            width: 100%;
            cursor: pointer;
            padding: 16px 20px;
            transition: all 0.2s ease;
          "
        >
          <div class="flex-center" style="gap: 14px">
            <div
              style="
                width: 44px;
                height: 44px;
                background: var(--accent-light);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span
                style="font-size: 18px; font-weight: 700; color: var(--accent)"
                >SI</span
              >
            </div>
            <span
              style="font-weight: 600; font-size: 16px; color: var(--text-main)"
              >සිංහල</span
            >
          </div>
          <i
            class="ph ph-caret-right"
            style="color: var(--text-muted); font-size: 18px"
          ></i>
        </button>

        <button
          onclick="setLanguage('ta')"
          class="card flex-between"
          style="
            width: 100%;
            cursor: pointer;
            padding: 16px 20px;
            transition: all 0.2s ease;
          "
        >
          <div class="flex-center" style="gap: 14px">
            <div
              style="
                width: 44px;
                height: 44px;
                background: var(--accent-light);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span
                style="font-size: 18px; font-weight: 700; color: var(--accent)"
                >TA</span
              >
            </div>
            <span
              style="font-weight: 600; font-size: 16px; color: var(--text-main)"
              >தமிழ்</span
            >
          </div>
          <i
            class="ph ph-caret-right"
            style="color: var(--text-muted); font-size: 18px"
          ></i>
        </button>
      </div>

      <div class="animate-fade-in-up stagger-2" style="margin-top: 32px">
        <div
          class="setting-item"
          style="padding: 16px 0; border-bottom: 1px solid var(--border)"
        >
          <div class="setting-label">
            <div class="setting-icon">
              <i class="ph-fill ph-moon" style="font-size: 20px"></i>
            </div>
            <span>Dark Mode</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" />
            <span class="switch-slider"></span>
          </label>
        </div>
      </div>

      <p class="text-sm text-muted mt-5" style="font-size: 12px">
        Content from public feeds; all rights reserved by respective sources.
      </p>
    </div>

    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (localStorage.getItem("app_theme") === "dark") {
          document.getElementById("theme-toggle").checked = true;
        }
      });
    </script>
  </body>
</html>
